<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starting Lineup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Starting Lineup</h1>

  <form id="lineupForm">
    <!-- Status radio buttons -->
    <p>
      <fieldset>
        <legend>Status:</legend>
        <label>
          <input type="radio" name="status" value="Draft" />
          Draft
        </label>
        <label>
          <input type="radio" name="status" value="Final" checked />
          Final
        </label>
      </fieldset>
    </p>

    <!-- Date drop-down -->
    <p>
      <label for="gameDate">Date:</label>
      <select id="gameDate" name="gameDate">
        <option value="March 20">March 20</option>
        <option value="March 24">March 24</option>
        <option value="April 2">April 2</option>
        <option value="April 6">April 6</option>
        <option value="April 13">April 13</option>
      </select>
    </p>

    <!-- Players checkboxes -->
    <p>
      <fieldset>
        <legend>Players:</legend>
        <label>
          <input type="checkbox" name="players" value="Aarav Agarwal" />
          Aarav Agarwal
        </label><br />
        <label>
          <input type="checkbox" name="players" value="Ava Johnson" />
          Ava Johnson
        </label><br />
        <label>
          <input type="checkbox" name="players" value="Julio Ortiz" />
          Julio Ortiz
        </label><br />
        <label>
          <input type="checkbox" name="players" value="Liam Rubio" />
          Liam Rubio
        </label><br />
        <label>
          <input type="checkbox" name="players" value="Emma Witherspoon" />
          Emma Witherspoon
        </label>
      </fieldset>
    </p>

    <!-- Submit button -->
    <p>
      <input type="submit" value="Submit" />
    </p>
  </form>

  <!-- Area where the results will be displayed -->
  <div id="output"></div>

  <script src="script.js"></script>
</body>
</html>
